<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Smithfield Implement Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:      #1279BE;
      --blue-dark: #0d5f96;
      --gold:      #FFB302;
      --white:     #ffffff;
      --bg:        #f1f5f9;
      --surface:   #ffffff;
      --border:    #e2e8f0;
      --text:      #0f172a;
      --muted:     #64748b;
      --danger:    #ef4444;
      --danger-bg: #fef2f2;
      --green:     #16a34a;
      --green-bg:  #f0fdf4;
      --radius:    10px;
      --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    /* ── Login Screen ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #0a3d6b 0%, #1279BE 100%);
    }
    .login-card {
      background: var(--white);
      border-radius: 16px;
      padding: 48px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,.2);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo strong {
      display: block;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--blue);
    }
    .login-logo span {
      font-size: .75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .login-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    .login-sub   { font-size: .875rem; color: var(--muted); margin-bottom: 28px; }
    .form-group  { margin-bottom: 16px; }
    .form-label  { display: block; font-size: .8rem; font-weight: 600; margin-bottom: 6px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .form-input  {
      width: 100%; padding: 12px 14px;
      border: 2px solid var(--border); border-radius: var(--radius);
      font-size: .9rem; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color .2s;
    }
    .form-input:focus { border-color: var(--blue); }
    .login-btn {
      width: 100%; padding: 13px;
      background: var(--blue); color: var(--white);
      border: none; border-radius: var(--radius);
      font-size: .9rem; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer; transition: background .2s;
      margin-top: 8px;
    }
    .login-btn:hover { background: var(--blue-dark); }
    .login-error {
      background: var(--danger-bg); color: var(--danger);
      border: 1px solid #fecaca; border-radius: var(--radius);
      padding: 10px 14px; font-size: .85rem;
      margin-top: 12px; display: none;
    }

    /* ── App Shell ── */
    #app { display: none; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 0; left: 0;
      width: 240px; height: 100vh;
      background: #0a1929;
      display: flex; flex-direction: column;
      padding: 0;
      z-index: 50;
    }
    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-logo strong { display: block; font-size: .95rem; font-weight: 700; color: #fff; }
    .sidebar-logo span   { font-size: .68rem; color: var(--gold); text-transform: uppercase; letter-spacing: .08em; }
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      font-size: .85rem; font-weight: 500;
      color: rgba(255,255,255,.6);
      cursor: pointer; transition: all .2s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: rgba(255,255,255,.07); color: #fff; }
    .nav-item.active { background: var(--blue); color: #fff; }
    .nav-item svg { flex-shrink: 0; opacity: .8; }
    .nav-item.active svg { opacity: 1; }
    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid rgba(255,255,255,.08);
    }
    .logout-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      font-size: .85rem; font-weight: 500;
      color: rgba(255,255,255,.5);
      cursor: pointer; transition: all .2s;
      border: none; background: none; width: 100%;
    }
    .logout-btn:hover { background: rgba(239,68,68,.15); color: #ef4444; }

    /* Main */
    .main { margin-left: 240px; min-height: 100vh; }
    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 40;
    }
    .topbar-title { font-size: 1.1rem; font-weight: 700; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .badge {
      display: inline-flex; align-items: center;
      padding: 4px 10px; border-radius: 99px;
      font-size: .72rem; font-weight: 600;
    }
    .badge-blue  { background: #dbeafe; color: var(--blue); }
    .badge-green { background: var(--green-bg); color: var(--green); }
    .badge-gold  { background: #fef3c7; color: #b45309; }

    .content { padding: 32px; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex; align-items: flex-start; gap: 16px;
    }
    .stat-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .stat-icon.blue   { background: #dbeafe; color: var(--blue); }
    .stat-icon.gold   { background: #fef3c7; color: #b45309; }
    .stat-icon.green  { background: var(--green-bg); color: var(--green); }
    .stat-value { font-size: 2rem; font-weight: 700; line-height: 1; }
    .stat-label { font-size: .8rem; color: var(--muted); margin-top: 4px; }

    /* Table */
    .table-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .table-header h3 { font-size: .95rem; font-weight: 700; }
    .search-input {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .82rem; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color .2s;
      width: 220px;
    }
    .search-input:focus { border-color: var(--blue); }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 11px 24px;
      font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    td { padding: 14px 24px; font-size: .875rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }
    .td-muted { color: var(--muted); font-size: .8rem; }
    .delete-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 10px; border-radius: 6px;
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-size: .78rem; font-weight: 500;
      cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif;
    }
    .delete-btn:hover { background: var(--danger-bg); border-color: #fecaca; color: var(--danger); }
    .export-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 8px;
      background: var(--blue); color: #fff;
      border: none; font-size: .8rem; font-weight: 600;
      cursor: pointer; transition: background .2s; font-family: 'Inter', sans-serif;
    }
    .export-btn:hover { background: var(--blue-dark); }
    .empty-state {
      text-align: center; padding: 48px 24px;
      color: var(--muted); font-size: .9rem;
    }
    .empty-state svg { margin: 0 auto 12px; opacity: .3; }

    /* Message expand */
    .msg-preview { max-width: 320px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; color: var(--blue); }
    .msg-preview:hover { text-decoration: underline; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--white);
      border-radius: 14px;
      padding: 32px;
      max-width: 520px; width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,.2);
      transform: translateY(12px); transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: none; }
    .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .modal-meta { font-size: .8rem; color: var(--muted); margin-bottom: 16px; }
    .modal-body { font-size: .9rem; line-height: 1.7; white-space: pre-wrap; background: var(--bg); padding: 16px; border-radius: 8px; }
    .modal-close {
      margin-top: 20px; padding: 10px 20px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer; font-family: 'Inter', sans-serif;
      font-size: .85rem; font-weight: 600;
    }
    .modal-close:hover { background: var(--border); }

    /* Page sections */
    .page { display: none; }
    .page.active { display: block; }

    /* Loading spinner */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 48px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--text); color: #fff;
      padding: 12px 20px; border-radius: 10px;
      font-size: .85rem; font-weight: 500;
      box-shadow: var(--shadow-md);
      transform: translateY(8px); opacity: 0;
      transition: all .25s; z-index: 300;
    }
    .toast.show { transform: none; opacity: 1; }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <strong>Smithfield Implement Co.</strong>
      <span>Admin Dashboard</span>
    </div>
    <h2 class="login-title">Sign in</h2>
    <p class="login-sub">Enter your admin secret to continue.</p>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="secret-input">Admin Secret</label>
        <input id="secret-input" type="password" class="form-input" placeholder="••••••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="login-btn">Sign In</button>
      <div class="login-error" id="login-error">Incorrect secret. Please try again.</div>
    </form>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <strong>Smithfield Implement</strong>
        <span>Admin Panel</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-page="dashboard">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
      <button class="nav-item" data-page="subscribers">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Subscribers
      </button>
      <button class="nav-item" data-page="contacts">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Contact Messages
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" id="logout-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-right">
        <span class="badge badge-green">● Live</span>
        <a href="/" target="_blank" class="badge badge-blue">View Site ↗</a>
      </div>
    </div>

    <div class="content">

      <!-- Dashboard Page -->
      <div class="page active" id="page-dashboard">
        <div class="stats-grid" id="stats-grid">
          <div class="spinner" style="grid-column:1/-1"></div>
        </div>
      </div>

      <!-- Subscribers Page -->
      <div class="page" id="page-subscribers">
        <div class="table-card">
          <div class="table-header">
            <h3>Email Subscribers</h3>
            <div style="display:flex;gap:10px;align-items:center;">
              <input type="text" class="search-input" id="sub-search" placeholder="Search name or email..." />
              <button class="export-btn" id="export-subs">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Export CSV
              </button>
            </div>
          </div>
          <div id="subs-table-wrap"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Contacts Page -->
      <div class="page" id="page-contacts">
        <div class="table-card">
          <div class="table-header">
            <h3>Contact Messages</h3>
            <input type="text" class="search-input" id="con-search" placeholder="Search name or email..." />
          </div>
          <div id="cons-table-wrap"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Message Modal -->
<div class="modal-overlay" id="msg-modal">
  <div class="modal">
    <div class="modal-title" id="modal-name"></div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-body" id="modal-body"></div>
    <button class="modal-close" id="modal-close">Close</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let SECRET = '';
  let subsData = [];
  let consData = [];

  // ── Helpers ──
  function showToast(msg, dur = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  async function apiFetch(path, opts = {}) {
    const res = await fetch(path, {
      ...opts,
      headers: { 'x-admin-secret': SECRET, 'Content-Type': 'application/json', ...opts.headers },
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  // ── Login ──
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const secret = document.getElementById('secret-input').value;
    const err = document.getElementById('login-error');
    err.style.display = 'none';
    try {
      SECRET = secret;
      await apiFetch('/api/admin/stats');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadDashboard();
    } catch {
      SECRET = '';
      err.style.display = 'block';
    }
  });

  // ── Logout ──
  document.getElementById('logout-btn').addEventListener('click', () => {
    SECRET = '';
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('secret-input').value = '';
  });

  // ── Nav ──
  const pages = { dashboard: 'Dashboard', subscribers: 'Subscribers', contacts: 'Contact Messages' };
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      const page = btn.dataset.page;
      document.getElementById('page-' + page).classList.add('active');
      document.getElementById('topbar-title').textContent = pages[page];
      if (page === 'subscribers') loadSubscribers();
      if (page === 'contacts')    loadContacts();
    });
  });

  // ── Dashboard ──
  async function loadDashboard() {
    const grid = document.getElementById('stats-grid');
    grid.innerHTML = '<div class="spinner" style="grid-column:1/-1"></div>';
    const stats = await apiFetch('/api/admin/stats');
    grid.innerHTML = `
      <div class="stat-card">
        <div class="stat-icon blue">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div>
          <div class="stat-value">${stats.totalSubscribers}</div>
          <div class="stat-label">Total Subscribers</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <div>
          <div class="stat-value">${stats.newThisWeek}</div>
          <div class="stat-label">New This Week</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon gold">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div>
          <div class="stat-value">${stats.totalContacts}</div>
          <div class="stat-label">Contact Messages</div>
        </div>
      </div>
    `;
  }

  // ── Subscribers ──
  async function loadSubscribers() {
    const wrap = document.getElementById('subs-table-wrap');
    wrap.innerHTML = '<div class="spinner"></div>';
    subsData = await apiFetch('/api/admin/subscribers');
    renderSubsTable(subsData);
  }

  function renderSubsTable(data) {
    const wrap = document.getElementById('subs-table-wrap');
    if (!data.length) {
      wrap.innerHTML = '<div class="empty-state"><svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>No subscribers yet.</div>';
      return;
    }
    wrap.innerHTML = `<table>
      <thead><tr>
        <th>#</th><th>Name</th><th>Email</th><th>Subscribed</th><th></th>
      </tr></thead>
      <tbody>
        ${data.map((r, i) => `
          <tr>
            <td class="td-muted">${i + 1}</td>
            <td><strong>${esc(r.name)}</strong></td>
            <td class="td-muted">${esc(r.email)}</td>
            <td class="td-muted">${formatDate(r.created_at)}</td>
            <td><button class="delete-btn" onclick="deleteSub(${r.id})">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
              Remove
            </button></td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  }

  async function deleteSub(id) {
    if (!confirm('Remove this subscriber?')) return;
    await apiFetch('/api/admin/subscribers/' + id, { method: 'DELETE' });
    subsData = subsData.filter(r => r.id !== id);
    renderSubsTable(subsData);
    showToast('Subscriber removed');
  }

  document.getElementById('sub-search').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    renderSubsTable(subsData.filter(r => r.name.toLowerCase().includes(q) || r.email.toLowerCase().includes(q)));
  });

  document.getElementById('export-subs').addEventListener('click', () => {
    const csv = ['Name,Email,Subscribed', ...subsData.map(r => `"${r.name}","${r.email}","${formatDate(r.created_at)}"`)].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = 'smithfield-subscribers.csv';
    a.click();
    showToast('CSV exported');
  });

  // ── Contacts ──
  async function loadContacts() {
    const wrap = document.getElementById('cons-table-wrap');
    wrap.innerHTML = '<div class="spinner"></div>';
    consData = await apiFetch('/api/admin/contacts');
    renderConsTable(consData);
  }

  function renderConsTable(data) {
    const wrap = document.getElementById('cons-table-wrap');
    if (!data.length) {
      wrap.innerHTML = '<div class="empty-state"><svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>No messages yet.</div>';
      return;
    }
    wrap.innerHTML = `<table>
      <thead><tr>
        <th>#</th><th>Name</th><th>Email</th><th>Message</th><th>Date</th><th></th>
      </tr></thead>
      <tbody>
        ${data.map((r, i) => `
          <tr>
            <td class="td-muted">${i + 1}</td>
            <td><strong>${esc(r.name)}</strong></td>
            <td class="td-muted">${esc(r.email)}</td>
            <td><span class="msg-preview" onclick="openModal(${r.id})">${esc(r.message)}</span></td>
            <td class="td-muted">${formatDate(r.created_at)}</td>
            <td><button class="delete-btn" onclick="deleteCon(${r.id})">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
              Delete
            </button></td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  }

  function openModal(id) {
    const r = consData.find(x => x.id === id);
    if (!r) return;
    document.getElementById('modal-name').textContent = r.name + ' <' + r.email + '>';
    document.getElementById('modal-meta').textContent = formatDate(r.created_at);
    document.getElementById('modal-body').textContent = r.message;
    document.getElementById('msg-modal').classList.add('open');
  }
  document.getElementById('modal-close').addEventListener('click', () => document.getElementById('msg-modal').classList.remove('open'));
  document.getElementById('msg-modal').addEventListener('click', (e) => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });

  async function deleteCon(id) {
    if (!confirm('Delete this message?')) return;
    await apiFetch('/api/admin/contacts/' + id, { method: 'DELETE' });
    consData = consData.filter(r => r.id !== id);
    renderConsTable(consData);
    showToast('Message deleted');
  }

  document.getElementById('con-search').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    renderConsTable(consData.filter(r => r.name.toLowerCase().includes(q) || r.email.toLowerCase().includes(q)));
  });

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
